spring:
  application:
    name: mubs-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/mubs}
  mail:
    host: ${MAIL_HOST:smtpdm.aliyun.com}
    port: ${MAIL_PORT:465}
    username: ${ALIYUN_MAIL_USER:}
    password: ${ALIYUN_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl.enable: true
          starttls.enable: false

server:
  port: ${SERVER_PORT:8090}

mubs:
  jwt:
    secret: ${JWT_SECRET:mubs-default-jwt-secret-key-change-in-production-min-32-chars!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  hvas:
    webhook-secret: ${HVAS_WEBHOOK_SECRET:hvas-mubs-shared-secret}
    base-url: ${HVAS_BASE_URL:http://localhost:5000}
    api-key: ${HVAS_API_KEY:}
    polling:
      enabled: ${HVAS_POLLING_ENABLED:false}
      interval-ms: ${HVAS_POLLING_INTERVAL_MS:30000}
  dispatch:
    timeout-minutes: ${DISPATCH_TIMEOUT_MINUTES:30}
  upload:
    photo-dir: ${UPLOAD_PHOTO_DIR:./uploads/photos}
  demo:
    enabled: ${DEMO_ENABLED:true}
  h5:
    base-url: ${H5_BASE_URL:http://localhost:5173}
  notification:
    email:
      enabled: ${EMAIL_ENABLED:false}
      from: ${ALIYUN_MAIL_FROM:noreply@yourdomain.com}
    sms:
      enabled: ${SMS_ENABLED:false}
      access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
      sign-name: ${ALIYUN_SMS_SIGN_NAME:MUBS城管}
      template-code:
        dispatch: ${ALIYUN_SMS_TPL_DISPATCH:SMS_000001}
        timeout: ${ALIYUN_SMS_TPL_TIMEOUT:SMS_000002}

logging:
  level:
    com.mubs: DEBUG
    org.springframework.data.mongodb: INFO
